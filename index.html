<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>公司內部點餐工具</title>
  
  <!-- 引入 Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- 引入自訂 CSS -->
  <link rel="stylesheet" href="all.css">
  
  <!-- Google API 及 Identity Services -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="https://apis.google.com/js/api.js" async defer></script>
</head>
<body>

  <!-- 頂部導覽列 -->
  <header class="header">
    <div class="container header-container">
      <h1>🍔 內部點餐系統</h1>
      <div id="user-info" class="user-info hidden">
        <span id="user-name-display"></span>
        <span id="user-role-badge" class="badge"></span>
      </div>
    </div>
  </header>

  <!-- 登入區塊 -->
  <div id="login-container" class="container auth-container">
    <h2>請先登入</h2>
    <p>為了確認身分並讀取專屬資訊，請透過您的 Google 帳號進行登入授權。</p>
    <!-- Google 登入按鈕將在 JS 中初始化時綁定 -->
    <button id="auth-btn" class="btn btn-google">使用 Google 帳號登入授權</button>
  </div>

  <!-- 應用程式主要區塊 (預設隱藏) -->
  <main id="app-container" class="container hidden">
    <!-- 顯示訊息用的區域 -->
    <div id="alert-message" class="alert hidden"></div>

    <!-- 管理員專區：設定今日餐廳 -->
    <section id="admin-setup-section" class="card section admin-only hidden">
      <h3>⚙️ [管理員] 設定今日餐廳</h3>
      <p>請勾選今日開放點餐的餐廳：</p>
      <div id="admin-restaurant-checkboxes" class="checkbox-group">
        <!-- JS 產生的核取方塊 -->
      </div>
      <button id="save-today-config-btn" class="btn btn-primary mt-3">儲存設定</button>
    </section>

    <!-- 點餐區塊 -->
    <section id="order-section" class="section">
      <h3>🍽️ 今日餐點列表 (<span id="today-restaurants-display">載入中...</span>)</h3>
      <div id="menu-cards-container" class="menu-grid">
        <!-- JS 產生的餐點卡片 -->
      </div>
    </section>

    <!-- 確認訂單與管理員的清空資料 -->
    <section id="confirm-order-section" class="card section mt-4">
      <h3>📋 今天的訂餐狀況</h3>
      <div id="orders-list-container" class="orders-list mt-3">
        <!-- 從 Orders 工作表抓取的今日資料列表 -->
      </div>
      <div class="actions mt-3 flex-between">
        <button id="copy-orders-btn" class="btn btn-secondary">一鍵複製今日訂單</button>
        <button id="clear-orders-btn" class="btn btn-danger admin-only hidden">清空今日點餐 (管理員)</button>
      </div>
    </section>
  </main>

  <!-- 引入自訂 JS (我們使用 module，或是確保在 DOM 載入後執行) -->
  <script src="all.js"></script>
</body>
</html>
